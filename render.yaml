services:
  # ── FastAPI Churn Prediction API ─────────────────────────────────────────
  - type: web
    name: churn-prediction-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENV
        value: production
    healthCheckPath: /
